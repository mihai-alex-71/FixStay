<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixStay – Login & Register</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h2 class="logo"><a href="index.html">Fix<span>Stay</span></a></h2>
        <nav class="navigation" id="navMenu">
            <a href="index.html">Home</a>
            <a href="index.html#how">How It Works</a>
            <a href="index.html#roles">Roles</a>
            <a href="index.html#contact">Contact</a>
            <button class="btnLogin-popup" onclick="showTab('login')">Login</button>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <!-- AUTH -->
    <main class="auth-page">
        <div class="auth-wrapper">
            <div class="auth-header">
                <span class="logo">FixStay</span>
                <h2 id="authTitle">Welcome back</h2>
                <p id="authSub">Sign in to your account to continue</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">Login</button>
                <button class="auth-tab" id="tabRegister" onclick="showTab('register')">Register</button>
            </div>

            <div class="auth-body">

                <!-- LOGIN FORM -->
                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPass">Password</label>
                        <input type="password" id="loginPass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-form">Sign In</button>
                    <div class="auth-switch">
                        Don't have an account? <a href="#" onclick="showTab('register'); return false;">Register
                            here</a>
                    </div>
                </form>

                <!-- REGISTER FORM -->
                <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regFirst">First name</label>
                            <input type="text" id="regFirst" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label for="regLast">Last name</label>
                            <input type="text" id="regLast" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email address</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regRole">I am a...</label>
                        <select id="regRole" required>
                            <option value="" disabled selected>Select your role</option>
                            <option value="host">Host / Property Owner</option>
                            <option value="provider">Service Provider</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="regPass">Password</label>
                        <input type="password" id="regPass" placeholder="Min. 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="regConfirm">Confirm password</label>
                        <input type="password" id="regConfirm" placeholder="Repeat password" required>
                    </div>
                    <button type="submit" class="btn-form">Create Account</button>
                    <div class="auth-switch">
                        Already have an account? <a href="#" onclick="showTab('login'); return false;">Sign in</a>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script>
        // Hamburger
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            navMenu.classList.toggle('open');
        });

        // Auth tabs
        function showTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('loginForm').classList.toggle('active', isLogin);
            document.getElementById('registerForm').classList.toggle('active', !isLogin);
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
            document.getElementById('authTitle').textContent = isLogin ? 'Welcome back' : 'Create an account';
            document.getElementById('authSub').textContent = isLogin ? 'Sign in to your account to continue' : 'Join FixStay today — it\'s free';
        }

        // ==========================================
        // REAL BACKEND LOGIN
        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();

            // 1. Pack the "LoginRequest" box exactly how your Java DTO expects it
            const loginData = {
                email: document.getElementById('loginEmail').value, // Make sure this matches your DTO variable name!
                password: document.getElementById('loginPass').value
            };

            // 2. Ship it to your Spring Boot Bouncer
            try {
                const response = await fetch("http://localhost:8080/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }, // Telling Java we are sending JSON
                    body: JSON.stringify(loginData) // Converting our JS object to pure JSON text
                });

                // 3. Wait for the Manager to reply and show it on the screen!
                const message = await response.text();
                alert("Backend says: " + message);

            } catch (error) {
                alert("Could not connect to the server. Is Spring Boot running?");
            }
        }

        // ==========================================
        // REAL BACKEND REGISTER
        // ==========================================
        async function handleRegister(e) {
            e.preventDefault();
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;

            if (pass !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            // Fix the Role to match your Java Enum exactly (HOST, SERVICE_PROVIDER)
            let rawRole = document.getElementById('regRole').value;
            let formattedRole = "";
            if (rawRole === 'host') formattedRole = "HOST";
            if (rawRole === 'provider') formattedRole = "SERVICE_PROVIDER";

            // 1. Pack the "RegisterRequest" DTO box
            const registerData = {
                firstName: document.getElementById('regFirst').value,
                lastName: document.getElementById('regLast').value,
                email: document.getElementById('regEmail').value,
                password: pass,
                role: formattedRole
            };

            // 2. Ship it to the Bouncer
            try {
                const response = await fetch("http://localhost:8080/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(registerData)
                });

                // 3. Read the Manager's reply
                const message = await response.text();
                alert("Backend says: " + message);

            } catch (error) {
                alert("Could not connect to the server. Is Spring Boot running?");
            }
        }

        // Open register tab if URL has ?tab=register
        if (new URLSearchParams(location.search).get('tab') === 'register') showTab('register');
    </script>
</body>

</html>
